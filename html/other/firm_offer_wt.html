<!DOCTYPE html>
<html>

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>当前委托</title>
    <script src="/js/const.js"></script>
    <style>
        html,
        body {
            margin: 0;
            padding: 0;
            overflow-y: hidden;
        }

        .table-container {
            overflow-x: auto;
            font-size: 0.8em;
        }


        table {
            border-collapse: collapse;
            border-spacing: 0;
            width: 100%;
            max-width: 800px;
            margin: auto auto;
        }

        @media (max-width: 768px) {
            .table-container {
                overflow-x: auto;
            }

            table {
                min-width: 500px;
            }

        }

        table th,
        table td {
            text-align: center;
            padding: 10px;
        }

        table th {
            color: white;
            background-color: rgb(87, 167, 115);
            position: sticky;
            top: 0;
            z-index: 10;
        }

        table tr:nth-child(even) {
            background-color: #f2f2f2;
        }

        .title {
            text-indent: 16px;
            text-align: left;
            color: white;
            font-size: 12px;
            line-height: 30px;
            height: 30px;
            background-color: rgb(68, 129, 89);
        }
    </style>
</head>

<body>
    <div class="table-container">
        <table id="orderTable">
            <caption class="title">当前委托<span id="wtnum"></span></caption>
            <thead>
                <tr>
                    <th>时间</th>
                    <th>币种</th>
                    <th>操作</th>
                    <th>方向</th>
                    <th>触发价格</th>
                    <th>价值</th>
                </tr>
            </thead>
            <tbody id="tableBody"></tbody>
        </table>
    </div>

    <div id="empty"></div>


    <script>
        async function getOpenOrders(userAddress) {
            const url = 'https://api.hyperliquid.xyz/info';

            const payload = {
                type: "frontendOpenOrders",
                user: userAddress
            };

            try {
                await USD_TO_CNY();
                const response = await fetch(url, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify(payload)
                });

                if (!response.ok) {
                    throw new Error(`HTTP error! status: ${response.status}`);
                }

                const orders = await response.json();
                return orders;
            } catch (error) {
                console.error("获取当前委托失败:", error);
            }
        }

        // 极简渲染函数（仅做必要的格式化）
        function renderOrders(dataList) {
            document.getElementById("wtnum").innerHTML = ` (${dataList.length})`;
            const tbody = document.getElementById('tableBody');
            tbody.innerHTML = '';

            dataList.forEach(item => {
                const tr = document.createElement('tr');

                // 1. 时间戳转成截图格式：YYYY-MM-DD HH:mm
                const date = new Date(item.timestamp);
                const time = `${String(date.getMonth() + 1).padStart(2, '0')}-${String(date.getDate()).padStart(2, '0')} ${String(date.getHours()).padStart(2, '0')}:${String(date.getMinutes()).padStart(2, '0')}`;

                // 2. 动态判断“操作”类型（精准支持 8 种值）
                let op = "";
                const opMap = {
                    "Take Profit Market": "市价止盈",
                    "Take Profit Limit": "限价止盈",
                    "Stop Market": "市价止损",
                    "Stop Limit": "限价止损"
                };

                // 判断逻辑：只有当 isPositionTpsl 为 true 时，才走纯正的持仓止盈止损映射
                if (item.isPositionTpsl && opMap[item.orderType]) {
                    op = opMap[item.orderType];
                } else {
                    // 否则属于普通的开仓/方向单：
                    // 只要 orderType 字符串里包含 "Market"（比如 "Market" 或 "Take Profit Market"），就认定为市价
                    const isMarket = item.orderType && item.orderType.includes("Market");
                    const typeStr = isMarket ? "市价" : "限价";
                    const sideStr = item.side === 'B' ? "做多" : "做空";

                    op = typeStr + sideStr; // 组合成：市价做多 / 市价做空 / 限价做多 / 限价做空
                }

                // 3. 方向转中文（B=买入，A=卖出）
                const direction = item.side === 'B' ? '买入' : '卖出';

                // 4. 价格加 $ 符号，和截图格式统一
                const price = `$${item.limitPx}`;
                const triggerPrice = item.triggerPx ? `$${item.triggerPx}` : '-';

                // 按表头顺序填充单元格
                const cells = [
                    time,
                    item.coin,
                    op,          // 此时第二行会精准显示为 "市价做空"
                    direction,
                    '$' + formatNumber(Number(item.triggerPx)),
                    (item.sz === '0.0' ? '所有仓位' : '$' + formatNumber(item.sz * item.triggerPx)) +
                    (item.sz === '0.0' ? '' : ('<br/>¥' + formatNumber(item.sz * item.triggerPx * TheRateValue))),
                ];

                cells.forEach(text => {
                    const td = document.createElement('td');
                    td.innerHTML = text;
                    tr.appendChild(td);
                });

                tbody.appendChild(tr);
            });
        }

        const execute = async () => {
            // 请确保全局或上方已定义 MyHyperliquidAddress
            const orderData = await getOpenOrders(MyHyperliquidAddress);
            if (!orderData || orderData.length === 0) {
                document.getElementById('empty').innerHTML = '<p style="text-align:center;font-size:14px;color:gray;">当前没有任何委托订单</p>';
            } else {
                renderOrders(orderData);
            }
        }

        // 调用示例
        execute();
    </script>
</body>

</html>
